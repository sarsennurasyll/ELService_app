name: elservice
description: Мобильное приложение маркетплейса услуг по ремонту бытовой техники.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.11.0
  flutter: '>=3.38.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.10.0
  flutter_riverpod: ^3.3.2
  flutter_secure_storage: ^10.3.1
  freezed_annotation: ^3.1.0
  go_router: ^17.3.0
  intl: ^0.20.3
  json_annotation: ^4.12.0
  logger: ^2.7.0

dev_dependencies:
  build_runner: ^2.15.2
  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0

flutter:
  uses-material-design: true

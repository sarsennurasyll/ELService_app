services:
  postgres:
    image: postgres:16-alpine
    container_name: elservice-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: elservice
      POSTGRES_PASSWORD: elservice
      POSTGRES_DB: elservice
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elservice-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://elservice:elservice@postgres:5432/elservice?schema=public
    ports:
      - '3000:3000'
    depends_on:
      - postgres

volumes:
  postgres_data:
